
services:

# 1. PostgreSql Database

    db:
        image: postgres:15-alpine
        restart: always
        volumes:
            - postgres_data:/var/lib/postgresql/data
        environment:
            - POSTGRES_DB=${DB_NAME}
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
    
    # 2. Redis In-Memory Store for django channel notfications
    redis:
        image: redis:7-alpine
        restart: always
        ports:
            - '6379:6379'
        
    # 3. Django Backend
    backend:
        build: ./backend
        restart: always
        command: ['sh', '-c', 'python manage.py migrate && daphne -b 0.0.0.0 -p 8000 taskmaster.asgi:application']
        # volumes:
        # - ./backend:/app # bind mount: hot reload, any change on backed on pc, shows in the running container
        ports:
        - '8000:8000'
        environment:
            - SECRET_KEY=${SECRET_KEY}
            - DEBUG=${DEBUG}
            - ALLOWED_HOSTS=${ALLOWED_HOSTS}

            - DB_NAME=${DB_NAME}
            - DB_USER=${DB_USER}
            - DB_PASSWORD=${DB_PASSWORD}
            - DB_HOST=db
            - DB_PORT=5432

            - REDIS_URL=redis://redis:6379/0
            - ACCESS_TOKEN_LIFETIME_HOURS=${ACCESS_TOKEN_LIFETIME_HOURS}
            - REFRESH_TOKEN_LIFETIME_DAYS=${REFRESH_TOKEN_LIFETIME_DAYS}
            - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}

        depends_on:
            - redis
            - db
        volumes:
            - static_volume:/app/staticfiles  ## Django drops CSS here
    
    # 4. Nginx Vanilla JS 
    frontend:
        build: ./frontend
        restart: always
        ports:
        - '80:80'
        # volumes:
        #     - ./frontend/:/usr/share/nginx/html
        depends_on:
            - backend
        
        volumes:
            - static_volume:/django_static  # NGINX reads CSS from here
        
    # define persistent storage
volumes:
    postgres_data:
    static_volume:
